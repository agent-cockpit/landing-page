  - generic [ref=e99]:
    - generic [ref=e101]: FEATURES
    - heading "Built for real multi-agent sessions." [level=2] [ref=e103]
    - paragraph [ref=e104]: Everything a solo dev needs to run 10+ agents without losing the plot.
    - generic [ref=e105]:
      - generic [ref=e106]:
        - generic [ref=e107]: 🗺
        - generic [ref=e108]: OFFICE MODE
        - generic [ref=e109]: Each active session appears as a character in a pixel-art office. Agent state reflects through animation and placement. Clicking an agent opens its full session view. Designed to feel like a game, not just a dashboard.
      - generic [ref=e110]:
        - generic [ref=e111]: ⚑
        - generic [ref=e112]: UNIFIED APPROVALS
        - generic [ref=e113]: Approvals from Claude Code and Codex appear in one queue. Support for approve once, deny once, and always allow within a session. Risk context helps you make faster and safer decisions.
      - generic [ref=e114]:
        - generic [ref=e115]: ◷
        - generic [ref=e116]: TIMELINE & REPLAY
        - generic [ref=e117]: Events in chronological order. Inspect what happened during a session — approval events, tool calls, file changes, and completion events are all visible. Useful for debugging and understanding agent behavior.
      - generic [ref=e118]:
        - generic [ref=e119]: ◈
        - generic [ref=e120]: MULTI-PROVIDER
        - generic [ref=e121]: Claude Code and Codex side-by-side. Each session carries a provider stripe so you always know which model is doing what. Normalized event handling across providers.
      - generic [ref=e122]:
        - generic [ref=e123]: ⊟
        - generic [ref=e124]: DIFF & ARTIFACT REVIEW
        - generic [ref=e125]: See what files changed during a session. Inspect diffs per file, review session summaries, and audit agent output before you merge or accept it.
      - generic [ref=e126]:
        - generic [ref=e127]: ⊙
        - generic [ref=e128]: MEMORY PANEL
        - generic [ref=e129]: View and edit project memory. Keep persistent instructions and conventions in one place. Read and update knowledge that agents should remember across sessions.
  - generic [ref=e131]:
    - generic [ref=e133]: HOW IT WORKS
    - heading "Three layers, one control room." [level=2] [ref=e135]
    - generic [ref=e136]:
      - generic [ref=e137]:
        - generic [ref=e138]: "01"
        - generic [ref=e139]: PROVIDER LAYER
        - generic [ref=e140]: Claude Code and Codex emit events and approvals through their native integration surfaces. No custom patches — standard tool hooks.
      - generic [ref=e141]:
        - generic [ref=e142]: "02"
        - generic [ref=e143]: DAEMON LAYER
        - generic [ref=e144]: A local Node daemon normalizes provider events, stores them in SQLite, and broadcasts live updates over WebSocket. Zero cloud, fully local.
      - generic [ref=e145]:
        - generic [ref=e146]: "03"
        - generic [ref=e147]: BROWSER UI
        - generic [ref=e148]: The React interface consumes live events and updates the office map, operational panels, and session detail views in real time. Approve, inspect, or redirect any session.
