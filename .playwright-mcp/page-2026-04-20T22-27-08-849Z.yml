                    - /url: "#office-mode"
                    - img [ref=e422]
                - list [ref=e424]:
                  - listitem [ref=e425]: Each active session appears as a character in a pixel-art office.
                  - listitem [ref=e426]: Agent state is reflected visually through animation and placement.
                  - listitem [ref=e427]: Clicking an agent opens its detailed session view.
                  - listitem [ref=e428]: The map acts as the main spatial layer of the product.
                  - listitem [ref=e429]: The player also has a character on the map.
                  - listitem [ref=e430]: The experience is designed to feel like a game, not just a dashboard.
                - generic [ref=e431]:
                  - heading "Ops Mode" [level=3] [ref=e432]
                  - 'link "Permalink: Ops Mode" [ref=e433] [cursor=pointer]':
                    - /url: "#ops-mode"
                    - img [ref=e434]
                - list [ref=e436]:
                  - listitem [ref=e437]: Session list with live status.
                  - listitem [ref=e438]: Detailed session view.
                  - listitem [ref=e439]: Approval inbox for actions that need review.
                  - listitem [ref=e440]: Timeline for replaying session activity.
                  - listitem [ref=e441]: Diff viewer for changed files.
                  - listitem [ref=e442]: Memory panel for project instructions and notes.
                  - listitem [ref=e443]: Artifact and history surfaces for deeper inspection.
                - generic [ref=e444]:
                  - heading "Unified Approvals" [level=3] [ref=e445]
