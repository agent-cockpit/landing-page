                    - /url: "#the-idea"
                    - img [ref=e404]
                - paragraph [ref=e406]: "If you run several agent sessions at once, the hard part is not launching them. The hard part is knowing:"
                - list [ref=e407]:
                  - listitem [ref=e408]: what each agent is doing right now
                  - listitem [ref=e409]: which session needs your attention
                  - listitem [ref=e410]: which approval is safe to grant
                  - listitem [ref=e411]: what changed in the repository
                  - listitem [ref=e412]: how to find the session again later
                - paragraph [ref=e413]: Agent Cockpit solves that by combining a visual office map with a structured operations dashboard.
                - generic [ref=e414]:
                  - heading "Core Features" [level=2] [ref=e415]
                  - 'link "Permalink: Core Features" [ref=e416] [cursor=pointer]':
                    - /url: "#core-features"
                    - img [ref=e417]
                - generic [ref=e419]:
                  - heading "Office Mode" [level=3] [ref=e420]
