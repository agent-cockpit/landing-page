                - paragraph [ref=e500]: "Agent Cockpit has three main layers:"
                - list [ref=e501]:
                  - listitem [ref=e502]:
                    - paragraph [ref=e503]: Provider layer Claude Code and Codex emit events and approvals through their native integration surfaces.
                  - listitem [ref=e504]:
                    - paragraph [ref=e505]: Daemon layer A local daemon normalizes provider events, stores them in SQLite, and broadcasts live updates over WebSocket.
                  - listitem [ref=e506]:
                    - paragraph [ref=e507]: Browser UI The React interface consumes live events and updates the office map, operational panels, and session detail views.
                - paragraph [ref=e508]: "In practice, the flow looks like this:"
                - list [ref=e509]:
                  - listitem [ref=e510]: an agent performs an action
                  - listitem [ref=e511]: the daemon receives the event
                  - listitem [ref=e512]: the event is normalized and persisted locally
                  - listitem [ref=e513]: the browser updates in real time
                  - listitem [ref=e514]: you approve, inspect, or redirect the session
                - generic [ref=e515]:
