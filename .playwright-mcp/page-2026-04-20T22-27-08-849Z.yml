                - list [ref=e449]:
                  - listitem [ref=e450]: Approvals from Claude Code and Codex appear in one queue.
                  - listitem [ref=e451]: Each request can be reviewed with context.
                  - listitem [ref=e452]: Support for approve once, deny once, and always allow within a session.
                  - listitem [ref=e453]: Risk context helps you make faster and safer decisions.
                  - listitem [ref=e454]: Decisions are stored locally.
