                    - /url: "#agent-cockpit"
                    - img [ref=e361]
                - paragraph [ref=e363]: Agent Cockpit is a local-first control room for running multiple coding agents at the same time. It turns Claude Code and Codex sessions into something you can actually see, manage, approve, and review, with a pixel-art office on top and an operational control plane underneath.
                - paragraph [ref=e364]: The goal is to replace terminal sprawl with a single interface for visibility, approvals, diffs, memory, history, and live agent status.
