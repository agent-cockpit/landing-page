                    - /url: "#the-idea"
                    - img [ref=e434]
                - paragraph [ref=e436]: "If you run several agent sessions at once, the hard part is not launching them. The hard part is knowing:"
                - list [ref=e437]:
                  - listitem [ref=e438]: what each agent is doing right now
                  - listitem [ref=e439]: which session needs your attention
                  - listitem [ref=e440]: which approval is safe to grant
                  - listitem [ref=e441]: what changed in the repository
                  - listitem [ref=e442]: how to find the session again later
                - paragraph [ref=e443]: Agent Cockpit solves that by combining a visual office map with a structured operations dashboard.
                - generic [ref=e444]:
                  - heading "Core Features" [level=2] [ref=e445]
                  - 'link "Permalink: Core Features" [ref=e446] [cursor=pointer]':
                    - /url: "#core-features"
