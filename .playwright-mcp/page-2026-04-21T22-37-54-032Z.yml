                    - img [ref=e452]
                - list [ref=e454]:
                  - listitem [ref=e455]: Each active session appears as a character in a pixel-art office.
                  - listitem [ref=e456]: Agent state is reflected visually through animation and placement.
                  - listitem [ref=e457]: Clicking an agent opens its detailed session view.
                  - listitem [ref=e458]: The map acts as the main spatial layer of the product.
                  - listitem [ref=e459]: The player also has a character on the map.
                  - listitem [ref=e460]: The experience is designed to feel like a game, not just a dashboard.
                - generic [ref=e461]:
